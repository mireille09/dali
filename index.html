<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>♟️ 實毅大里員工</title>
  <script src="data.js"></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background: #f5f7fa; padding: 15px; margin: 0; }
    .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 450px; box-sizing: border-box; margin-top: 10px; transition: max-width 0.3s; }
    
    /* 集中感搜尋框設定 */
    .search-section { max-width: 400px; margin: 0 auto; }
    input { padding: 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 18px; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
    .btn-search { flex: 2; padding: 15px 0; background-color: #4a90e2; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .btn-clear { flex: 1; padding: 15px 0; background-color: #95a5a6; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
    
    /* 導覽連結 */
    .nav-link { margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; line-height: 2.5; display: flex; flex-wrap: wrap; justify-content: center; }
    .nav-link a { color: #4a90e2; text-decoration: none; font-weight: bold; cursor: pointer; margin: 0 5px; white-space: nowrap; }
    .nav-duty { color: #2c3e50 !important; }
    .nav-duty span { color: #27ae60 !important; }

    /* 移工卡片 */
    #result-display, #result-new, #result-dali { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px 0; width: 100%; }
    .emp-card { background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; text-align: center; width: calc((100% - 15px) / 2); }
    .emp-card img { width: 100%; height: auto; aspect-ratio: 3 / 4; object-fit: cover; border-radius: 4px; }
    .emp-card .emp-name-tag { font-weight: bold; font-size: 14px; margin-top: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }

    /* 轉出表格 */
    .resigned-table { width: 100%; border-collapse: collapse; font-size: 15px; background: white; border: 2px solid #636e72; }
    .resigned-table th, .resigned-table td { border: 1px solid #ccc; padding: 12px 8px; }
    .resigned-table th { background: #636e72; color: white; }
    .col-info { width: 100px; background-color: #f9f9f9; font-weight: bold; }

    /* 休假區 */
    #off-duty-box { margin-top: 30px; padding: 15px; background: #fff0f0; border-radius: 12px; border: 1px solid #ffcccc; text-align: left; font-size: 14px; }

    /* 電腦版大螢幕優化 */
    @media (min-width: 1200px) {
      .card { max-width: 1200px !important; width: 95% !important; }
      .search-section { max-width: 500px; }
      #result-dali { display: grid !important; grid-template-columns: repeat(8, 1fr) !important; gap: 12px; }
      .emp-card { width: 100% !important; }
    }
  </style>
</head>
<body>
<div class="card">
  <div id="page-search">
    <h2 style="color: #2c3e50;">🔍 員工快速查詢</h2>
    <div class="search-section">
      <input type="text" id="empId" placeholder="輸入工號或姓名 (空格分隔可多選)" onkeypress="if(event.keyCode==13) doSearch()">
      <div class="btn-group">
        <button class="btn-search" onclick="doSearch()">搜尋</button>
        <button class="btn-clear" onclick="clearSearch()">清空</button>
      </div>
    </div>
    <div id="result-display"></div>
  </div>

  <div id="page-new" style="display:none;">
    <h2 style="color: #27ae60;">🌱 03/13新進同仁</h2>
    <div id="result-new"></div>
  </div>

  <div id="page-resigned" style="display:none;">
    <h2 style="color: #d63031;">🚫 轉出人員名單</h2>
    <table class="resigned-table">
      <thead><tr><th class="col-info">日期/工地</th><th>轉出人員名單</th></tr></thead>
      <tbody id="resigned-tbody"></tbody>
    </table>
  </div>

  <div id="page-dali" style="display:none;">
    <h2 style="color: #2980b9;">🏢 大里工地員工</h2>
    <div id="result-dali"></div>
  </div>

  <div class="nav-link">
    
    <a onclick="showPage('search')">🔍 查詢</a>|
    <a onclick="showPage('new')">🌱 新進</a>|
    <a onclick="showPage('resigned')">🚫 轉出</a>|
    <span class="mobile-br"></span>
    <a onclick="showPage('dali')">🏢 大里移工</a>|
    <a href="duty.html" class="nav-duty">♚ <span>月曆</span></a>
  </div>

  <div id="off-duty-box">
    <div style="font-weight:bold; color:#d63031; margin-bottom:8px;">📅 今日休假人員</div>
    <div id="off-list">讀取中...</div>
  </div>
</div>

<script>
  window.onload = function() { loadOffDuty(); };

  function showPage(p) {
    ['search', 'new', 'resigned', 'dali'].forEach(id => {
      document.getElementById('page-' + id).style.display = 'none';
    });
    document.getElementById('page-' + p).style.display = 'block';
    if (p === 'dali') renderCards('result-dali', WORKER_DATA);
    if (p === 'new') loadNewComers();
    if (p === 'resigned') loadResigned();
  }

  function renderCards(targetId, list) {
    const div = document.getElementById(targetId);
    list.sort((a, b) => (parseInt(a.id.toString().replace(/\D/g,'')) || 0) - (parseInt(b.id.toString().replace(/\D/g,'')) || 0));
    div.innerHTML = list.map(e => `
      <div class='emp-card'>
        <div class='emp-name-tag'>${e.id} ${e.name}</div>
        <img src='${e.photoUrl}' onerror="this.src='https://via.placeholder.com'">
      </div>
    `).join('') || "查無資料";
  }

  function doSearch() {
    const kw = document.getElementById('empId').value.toUpperCase().split(/[\s,]+/).filter(k => k !== "");
    if(!kw.length) return;
    const res = WORKER_DATA.filter(e => kw.some(k => e.id.toUpperCase().includes(k) || e.name.toUpperCase().includes(k)));
    renderCards('result-display', res);
  }

  function loadNewComers() {
    const NEW_COMER_IDS = ["36074", "36075", "36076", "36077", "36078", "36079", "36080"];
    const res = WORKER_DATA.filter(w => NEW_COMER_IDS.includes(w.id.toString().trim()));
    renderCards('result-new', res);
  }

  function loadResigned() {
    const tbody = document.getElementById('resigned-tbody');
    const groups = {};
    RESIGNED_DATA.forEach(item => {
        const key = `${item.date}_${item.site}`;
        if (!groups[key]) groups[key] = { date: item.date, site: item.site, members: [] };
        if (Array.isArray(item.members)) groups[key].members = groups[key].members.concat(item.members);
        else if (item.member) groups[key].members.push(item.member);
    });
    tbody.innerHTML = Object.values(groups).sort((a,b)=>b.date.localeCompare(a.date)).map(g => `
      <tr><td class="col-info">${g.date}<br>${g.site}</td><td style="text-align:left; padding-left:15px;">${g.members.join('<br>')}</td></tr>
    `).join('') || "<tr><td colspan='2'>目前無轉出人員</td></tr>";
  }

  function loadOffDuty() {
    const today = new Date().toISOString().slice(0,10).replace(/-/g,"/");
    const list = LEAVE_DATA.filter(d => today >= d.start && today <= d.end);
    document.getElementById('off-list').innerHTML = list.length ? 
      list.map(e => `${e.id} ${e.name} (${e.start.slice(5)}~${e.end.slice(5)})`).join('<br>') : "今日無人休假";
  }

  function clearSearch() { document.getElementById('empId').value = ''; document.getElementById('result-display').innerHTML = ''; }
</script>
</body>
</html>
