<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-2027 排班精算師</title>
    <style>
        :root { --primary: #2c3e50; --weekend: #e74c3c; --holiday: #f39c12; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { border: none; background: #eee; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        .summary { background: #f0f7ff; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; line-height: 1.6; border: 1px solid #d0e4f7; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-weight: bold; color: #95a5a6; padding-bottom: 10px; font-size: 13px; }
        .day { padding: 12px 0; border-radius: 8px; font-size: 15px; border: 1px solid #f0f0f0; }
        .is-weekend { color: var(--weekend); background: #fff5f5; font-weight: bold; }
        .is-holiday-weekday { background: #fff9eb; color: var(--holiday); font-weight: bold; border: 1px solid var(--holiday); }
        .tag { font-weight: bold; font-size: 18px; display: block; margin-top: 5px; }
        .plus { color: #27ae60; } .minus { color: var(--weekend); }
        .holiday-list { margin-top: 20px; border-top: 2px dashed #eee; padding-top: 15px; }
        .holiday-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; color: #555; background: #fffcf5; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <button class="btn" onclick="changeMonth(-1)">❮</button>
        <h2 id="monthDisplay"></h2>
        <button class="btn" onclick="changeMonth(1)">❯</button>
    </div>

    <div class="summary" id="calcResult"></div>

    <div class="calendar-grid" id="calendar">
        <div class="day-name">一</div><div class="day-name">二</div><div class="day-name">三</div>
        <div class="day-name">四</div><div class="day-name">五</div><div class="day-name">六</div>
        <div class="day-name">日</div>
    </div>

    <div class="holiday-list">
        <strong>📌 平日國假 (額外加假)：</strong>
        <div id="listContent" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    // 2026 & 2027 國定假日資料庫 (包含預估補假)
    const allHolidays = {
        2026: {
            4: { 3: "兒童節補假", 4: "兒童節", 5: "清明節", 6: "清明節補假" },
            5: { 1: "勞動節" }, 6: { 19: "端午節" }, 9: { 25: "中秋補假", 28: "教師節" },
            10: { 9: "國慶補假", 10: "國慶日", 25: "光復節", 26: "光復補假" }, 12: { 25: "行憲紀念日" }
        },
        2027: {
            1: { 1: "元旦" },
            2: { 5: "除夕", 8: "初一", 9: "初二", 10: "初三", 11: "初四補", 12: "初五補", 26: "228補假" },
            4: { 5: "清明節", 6: "兒童節補假" },
            5: { 1: "勞動節" }, 6: { 9: "端午節" }, 9: { 15: "中秋節", 28: "教師節" },
            10: { 11: "國慶補假", 25: "光復節" }
        }
    };

    let currentViewDate = new Date();
    // 預設跳月邏輯：每月 25 號後看下個月
    if (currentViewDate.getDate() > 25) currentViewDate.setMonth(currentViewDate.getMonth() + 1);

    function render() {
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth() + 1;
        document.getElementById('monthDisplay').innerText = `${year}年 ${month}月`;

        const firstDay = new Date(year, month - 1, 1);
        const lastDay = new Date(year, month, 0).getDate();
        let startPos = (firstDay.getDay() === 0) ? 6 : firstDay.getDay() - 1;

        const grid = document.getElementById('calendar');
        const headers = grid.querySelectorAll('.day-name');
        grid.innerHTML = '';
        headers.forEach(h => grid.appendChild(h));

        let weekendCount = 0;
        let weekdayHolidayCount = 0;
        let holidayDetailsHTML = "";
        
        // 抓取對應年份、月份的國假
        const yearData = allHolidays[year] || {};
        const monthHolidays = yearData[month] || {};

        for (let i = 0; i < startPos; i++) grid.innerHTML += `<div class="day" style="border:none; background:transparent;"></div>`;

        for (let d = 1; d <= lastDay; d++) {
            const dateObj = new Date(year, month - 1, d);
            const dayNum = dateObj.getDay();
            const isWeekend = (dayNum === 0 || dayNum === 6);
            const isHoliday = !!monthHolidays[d];
            
            let classes = ["day"];
            if (isWeekend) {
                classes.push("is-weekend");
                weekendCount++;
            } else if (isHoliday) {
                // 平日國假：標黃框、算加假
                classes.push("is-holiday-weekday");
                weekdayHolidayCount++;
                holidayDetailsHTML += `<div class="holiday-item"><span>${month}/${d}</span><span>${monthHolidays[d]}</span></div>`;
            }
            grid.innerHTML += `<div class="${classes.join(' ')}">${d}</div>`;
        }

        const totalRest = 8 + weekdayHolidayCount;
        const diff = totalRest - weekendCount;
        const resDiv = document.getElementById('calcResult');
        
        let statusTag = (diff > 0) ? `<span class="tag plus">🎉 多出 ${diff} 天假</span>` : 
                       (diff < 0) ? `<span class="tag minus">💼 需值班 ${Math.abs(diff)} 天</span>` : `<span class="tag">⚖️ 剛好休完</span>`;
        
        resDiv.innerHTML = `應休 <strong>${totalRest}</strong> 天 (8+${weekdayHolidayCount}) | 周末 <strong>${weekendCount}</strong> 天${statusTag}`;
        document.getElementById('listContent').innerHTML = holidayDetailsHTML || "<div style='color:#ccc; font-size:14px;'>本月無平日國假</div>";
    }

    function changeMonth(step) { currentViewDate.setMonth(currentViewDate.getMonth() + step); render(); }
    render();
</script>
</body>
</html>
