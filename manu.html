<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食見生活 - 團購訂餐系統</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ea; color: #4a4a4a; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #5b7a58; border-bottom: 2px solid #e0d8c3; padding-bottom: 10px; }
        .section-title { background: #e0d8c3; padding: 5px 15px; border-radius: 5px; margin-top: 25px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #fafafa; }
        .price { color: #b35d3a; font-weight: bold; }
        .input-group { display: flex; align-items: center; gap: 10px; }
        input[type="number"] { width: 50px; padding: 5px; }
        input[type="text"] { width: 120px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .summary { margin-top: 30px; padding: 20px; background: #fdfaf5; border: 1px dashed #d1c7ac; text-align: right; }
        .total-row { font-size: 1.2em; margin-bottom: 8px; }
        .discount-info { color: #d9534f; font-size: 0.9em; }
        #final-price { font-size: 1.5em; color: #b35d3a; font-weight: bold; }
        button { background: #5b7a58; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; float: right; margin-top: 10px; }
        button:hover { background: #4a6347; }
        .order-list { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>食見生活 Foodlosophy 訂餐統計</h1>
    
    <div class="input-group" style="margin-bottom: 20px; justify-content: center;">
        <label><strong>訂購人姓名：</strong></label>
        <input type="text" id="current-user" placeholder="請輸入名字">
    </div>

    <form id="order-form">
        <div class="section-title">雙拼主餐區 (Double-Combo)</div>
        <table>
            <tr><th>品項</th><th>外送價</th><th>數量</th></tr>
            <tr data-name="酥嫩雙雞餐" data-price="230"><td>酥嫩雙雞餐</td><td class="price">230</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="松阪翅客餐" data-price="240"><td>松阪翅客餐</td><td class="price">240</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="特選豚牛餐" data-price="250"><td>特選豚牛餐</td><td class="price">250</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="極炙鱸牛餐" data-price="280"><td>極炙鱸牛餐</td><td class="price">280</td><td><input type="number" min="0" value="0"></td></tr>
        </table>

        <div class="section-title">經典主餐區 (Classic Mains)</div>
        <table>
            <tr><th>品項</th><th>外送價</th><th>數量</th></tr>
            <tr data-name="蔥油手撕雞餐" data-price="140"><td>蔥油手撕雞餐</td><td class="price">140</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="經典嫩雞胸餐" data-price="150"><td>經典嫩雞胸餐</td><td class="price">150</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="紐奧良雞翅餐" data-price="160"><td>紐奧良雞翅餐</td><td class="price">160</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="香草雞腿排餐" data-price="180"><td>香草雞腿排餐</td><td class="price">180</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="嫩煎骰子牛餐" data-price="180"><td>嫩煎骰子牛餐</td><td class="price">180</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="香烤松阪豬餐" data-price="180"><td>香烤松阪豬餐</td><td class="price">180</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="秘製豬里肌餐" data-price="170"><td>秘製豬里肌餐</td><td class="price">170</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="金焰烤鮭魚餐" data-price="200"><td>金焰烤鮭魚餐</td><td class="price">200</td><td><input type="number" min="0" value="0"></td></tr>
            <tr data-name="香鱸魚卵片餐" data-price="200"><td>香鱸魚卵片餐</td><td class="price">200</td><td><input type="number" min="0" value="0"></td></tr>
        </table>
    </form>

    <button onclick="addOrder()">加入統計清單</button>

    <div class="order-list">
        <h3>已登記清單</h3>
        <ul id="record-ul"></ul>
    </div>

    <div class="summary">
        <div class="total-row">原始總金額：$<span id="raw-total">0</span></div>
        <div class="discount-info" id="discount-text">尚未達折扣門檻</div>
        <div class="total-row">應付總計：<span id="final-price">$0</span></div>
    </div>
</div>

<script>
    let allOrders = [];

    function addOrder() {
        const userName = document.getElementById('current-user').value;
        if (!userName) {
            alert('請輸入訂購人姓名！');
            return;
        }

        const rows = document.querySelectorAll('#order-form tr[data-name]');
        let userItems = [];

        rows.forEach(row => {
            const qty = parseInt(row.querySelector('input').value);
            if (qty > 0) {
                userItems.push({
                    name: row.getAttribute('data-name'),
                    price: parseInt(row.getAttribute('data-price')),
                    qty: qty
                });
            }
        });

        if (userItems.length === 0) {
            alert('請至少選擇一個便當');
            return;
        }

        allOrders.push({ user: userName, items: userItems });
        updateDisplay();
        
        // 重置表單
        document.getElementById('current-user').value = '';
        rows.forEach(row => row.querySelector('input').value = 0);
    }

    function updateDisplay() {
        const listUl = document.getElementById('record-ul');
        listUl.innerHTML = '';
        let rawTotal = 0;

        allOrders.forEach((order, index) => {
            const li = document.createElement('li');
            let itemDesc = order.items.map(i => `${i.name}x${i.qty}`).join(', ');
            li.innerHTML = `<strong>${order.user}</strong>: ${itemDesc}`;
            listUl.appendChild(li);

            order.items.forEach(i => {
                rawTotal += i.price * i.qty;
            });
        });

        document.getElementById('raw-total').innerText = rawTotal;

        let finalPrice = rawTotal;
        let discountDesc = "尚未達折扣門檻";

        if (rawTotal >= 2000) {
            finalPrice = Math.round(rawTotal * 0.85);
            discountDesc = "已享滿2000元 85折優惠！";
        } else if (rawTotal >= 1000) {
            finalPrice = Math.round(rawTotal * 0.9);
            discountDesc = "已享滿1000元 9折優惠！";
        }

        document.getElementById('discount-text').innerText = discountDesc;
        document.getElementById('final-price').innerText = '$' + finalPrice;
    }
</script>

</body>
</html>
