<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實毅營造-行腳管理</title>
    <style>
        :root { --primary-red: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        
        /* 頂部極簡固定列 */
        .header {
            position: sticky; top: 0; z-index: 1000;
            background: var(--primary-red); color: white;
            padding: 8px 12px; display: flex; align-items: center; justify-content: space-between;
        }
        .header h2 { margin: 0; font-size: 16px; flex: 1; }
        .summary-mini { display: flex; gap: 10px; }
        .sum-box { text-align: right; line-height: 1.2; }
        .sum-box small { font-size: 10px; opacity: 0.8; display: block; }
        .sum-box span { font-size: 14px; font-weight: bold; }

        .content { max-width: 900px; margin: 0 auto; padding-bottom: 20px; }
        
        /* 表格 PC 版 */
        table { width: 100%; border-collapse: collapse; background: white; table-layout: fixed; }
        th { background: #eee; padding: 10px 2px; font-size: 12px; }
        td { padding: 8px 2px; border-bottom: 1px solid #eee; text-align: center; }
        input { width: 90%; padding: 4px; border: 1px solid #ddd; border-radius: 3px; text-align: center; }

        /* 手機版精簡樣式 */
        @media screen and (max-width: 600px) {
            thead { display: none; }
            tr { 
                display: block; background: white; margin-bottom: 4px; 
                padding: 8px 12px; border-bottom: 1px solid #ddd;
            }
            td { display: block; width: 100% !important; padding: 2px 0 !important; text-align: left !important; border: none !important; }
            
            /* 第一行：名稱 (左) 與 小計 (右) */
            .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
            .item-title { font-weight: bold; width: 65% !important; }
            .item-title input { text-align: left; border: none; background: transparent; font-size: 15px; width: 100%; }
            .item-subtotal { width: 30% !important; text-align: right !important; color: var(--primary-red); font-weight: bold; font-size: 16px; }

            /* 第二行：參數橫排 (組 / 單價 / 數量 / 總量) */
            .row-params { display: flex; gap: 5px; font-size: 11px; color: #666; align-items: center; }
            .row-params div { display: flex; align-items: center; }
            .row-params input { width: 35px; margin: 0 2px; padding: 2px; font-size: 11px; }
            .total-hint { margin-left: auto; color: #2ecc71; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🏮 行腳物資管理</h2>
    <div class="summary-mini">
        <div class="sum-box"><small>支出</small><span id="total">0</span></div>
        <div class="sum-box"><small>剩餘</small><span id="rem">14,000</span></div>
    </div>
</div>

<div class="content">
    <table id="mainTable">
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    const data = [
        ["寶礦利 580ml", 24, 462, 2, "瓶"],
        ["寶礦利(低卡)", 24, 462, 1, "瓶"],
        ["悅氏礦泉水 600ml", 24, 168, 2, "瓶"],
        ["Simple 純水", 24, 144, 2, "瓶"],
        ["綜合堅果隨手包", 1, 30, 120, "包"],
        ["名糖檸檬鹽糖", 1, 89, 3, "包"],
        ["BF薄荷岩鹽糖", 1, 62, 3, "包"],
        ["貝納頌拿鐵", 3, 75, 8, "瓶"],
        ["貝納頌榛果", 3, 66, 4, "瓶"],
        ["清潔袋-大", 1, 42, 2, "卷"],
        ["聯翔鳳梨酥", 1, 30, 80, "個"],
        ["聯翔杏仁瓦片", 12, 336, 5, "包"],
        ["義美無糖豆奶", 24, 284, 1, "瓶"],
        ["原萃綠茶玉露", 4, 78, 4, "瓶"]
    ];

    for (let i = 0; i < 5; i++) { data.push(["", 0, 0, 0, "個"]); }

    function render() {
        let totalAll = 0;
        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        
        data.forEach((item, i) => {
            let sub = item[2] * item[3]; 
            totalAll += sub;
            let totalUnits = item[1] * item[3];
            let note = (item[0] && item[3] > 0) ? `(共${totalUnits}${item[4]})` : "";
            
            tbody.innerHTML += `
                <tr>
                    <td class="row-top">
                        <div class="item-title"><input type="text" value="${item[0]}" onchange="data[${i}][0]=this.value;render()"></div>
                        <div class="item-subtotal">$${sub.toLocaleString()}</div>
                    </td>
                    <td class="row-params">
                        <div>組<input type="number" value="${item[1]}" oninput="updateVal(${i}, 1, this.value)"></div>
                        <div>$ <input type="number" value="${item[2]}" oninput="updateVal(${i}, 2, this.value)"></div>
                        <div>x <input type="number" value="${item[3]}" oninput="updateVal(${i}, 3, this.value)"></div>
                        <div class="total-hint">${note}</div>
                    </td>
                </tr>`;
        });

        document.getElementById('total').innerText = totalAll.toLocaleString();
        let remain = 14000 - totalAll;
        let remDisplay = document.getElementById('rem');
        remDisplay.innerText = remain.toLocaleString();
        remDisplay.style.color = remain < 0 ? "#ffeb3b" : "#fff";
    }

    function updateVal(index, field, val) {
        data[index][field] = parseFloat(val) || 0;
        render();
    }
    render();
</script>
</body>
</html>
