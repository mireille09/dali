<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>實毅營造-行腳物資管理</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #fffcf5; padding: 20px; color: #333; }
        .box { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 6px solid #d32f2f; }
        h2 { text-align: center; color: #d32f2f; margin-bottom: 25px; }
        .summary { display: flex; justify-content: space-around; background: #fdf2f2; padding: 15px; margin-bottom: 20px; font-weight: bold; border-radius: 8px; border: 1px solid #f9dcdc; }
        .sum-box { text-align: center; }
        .sum-label { font-size: 14px; color: #666; display: block; }
        .sum-val { font-size: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { border-bottom: 2px solid #eee; padding: 12px; font-size: 13px; background: #fafafa; color: #888; }
        td { padding: 8px 4px; border-bottom: 1px solid #f1f1f1; }
        input { width: 90%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 14px; }
        input:focus { border-color: #d32f2f; outline: none; background: #fffafa; }
        .text-left { text-align: left; }
        .text-right { text-align: right; padding-right: 15px; }
        .subtotal { font-weight: bold; color: #d32f2f; font-family: Consolas, monospace; }
        .note-text { font-size: 14px; color: #2c3e50; font-weight: bold; }
        .empty-hint { color: #ccc; font-style: italic; font-size: 12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>🏮 十八庄媽祖行腳物資管理</h2>
    <div class="summary">
        <div class="sum-box"><span class="sum-label">總預算</span><span class="sum-val">14,000</span></div>
        <div class="sum-box"><span class="sum-label">目前支出</span><span id="total" class="sum-val">0</span></div>
        <div class="sum-box"><span class="sum-label">剩餘餘額</span><span id="rem" class="sum-val">14,000</span></div>
    </div>
    <table>
        <thead>
            <tr>
                <th width="25%">項目名稱</th>
                <th width="10%">組數<br><small>(每箱/包入數)</small></th>
                <th width="12%">單價</th>
                <th width="10%">採購數量</th>
                <th width="15%" class="text-right">金額 (小計)</th>
                <th width="28%">物資總量推算</th>
            </tr>
        </thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script>
    // 數據結構: [項目名, 單件組數, 單價, 數量, 單位名]
    const data = [
        ["寶礦利 580ml", 24, 462, 2, "瓶"],
        ["寶礦利(低卡) 580ml", 24, 462, 1, "瓶"],
        ["悅氏礦泉水 600ml", 24, 168, 2, "瓶"],
        ["Simple 純水 280ml", 24, 144, 2, "瓶"],
        ["綜合堅果隨手包", 1, 30, 120, "包"],
        ["名糖檸檬鹽糖", 1, 89, 3, "包"],
        ["BF薄荷岩鹽檸檬糖", 1, 62, 3, "包"],
        ["貝納頌經典拿鐵(3入)", 3, 75, 8, "瓶"],
        ["貝納頌榛果拿鐵(3入)", 3, 66, 4, "瓶"],
        ["家樂福環保垃圾袋", 1, 42, 2, "卷"],
        ["聯翔鳳梨酥", 1, 30, 80, "個"],
        ["聯翔杏仁瓦片", 12, 336, 5, "包"],
        ["義美無糖豆奶", 24, 284, 1, "瓶"],
        ["原萃綠茶玉露", 4, 78, 4, "瓶"]
    ];

    // 新增 5 個空白列
    for (let i = 0; i < 5; i++) { data.push(["", 0, 0, 0, "個"]); }

    function render() {
        let totalAll = 0;
        const tbody = document.getElementById('list');
        tbody.innerHTML = '';
        
        data.forEach((item, i) => {
            let subtotal = item[2] * item[3];
            totalAll += subtotal;
            let totalUnits = item[1] * item[3];
            
            // 邏輯：若數量 > 0 顯示計算結果，否則顯示空白提示
            let noteContent = item[3] > 0 
                ? `<span class="note-text">共計 ${totalUnits} ${item[4]}</span>` 
                : `<span class="empty-hint">等待輸入...</span>`;
            
            tbody.innerHTML += `
                <tr>
                    <td class="text-left"><input type="text" value="${item[0]}" onchange="data[${i}][0]=this.value;render()"></td>
                    <td><input type="number" value="${item[1]}" oninput="updateVal(${i}, 1, this.value)"></td>
                    <td><input type="number" value="${item[2]}" oninput="updateVal(${i}, 2, this.value)"></td>
                    <td><input type="number" value="${item[3]}" oninput="updateVal(${i}, 3, this.value)"></td>
                    <td class="text-right"><span class="subtotal">${subtotal.toLocaleString()}</span></td>
                    <td class="text-left">${noteContent}</td>
                </tr>`;
        });

        document.getElementById('total').innerText = totalAll.toLocaleString();
        let remain = 14000 - totalAll;
        let remEl = document.getElementById('rem');
        remEl.innerText = remain.toLocaleString();
        remEl.style.color = remain < 0 ? "#d32f2f" : "#333";
    }

    function updateVal(index, field, val) {
        data[index][field] = parseFloat(val) || 0;
        render();
    }

    render();
</script>
</body>
</html>
