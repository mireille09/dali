<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>♚ 財務帳務系統</title>
  <script src="card_data.js"></script>
  <style>
    :root { --primary: #27ae60; --bg: #f5f7fa; --card-border: #eee; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; text-align: center; }
    
    /* 會呼吸的縮放白框 */
    .container { 
        background: white; padding: 20px; border-radius: 16px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        display: inline-block; width: 100%; max-width: 450px; 
        box-sizing: border-box; transition: max-width 0.3s;
    }

    .total-box { background: #1a1a1a; color: #ffce00; padding: 25px; border-radius: 16px; text-align: center; margin-bottom: 20px; border: 2px solid var(--primary); }
    .card-group { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.06); border-left: 8px solid #ccc; text-align: left; }
    .card-main { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .card-group.paid { opacity: 0.5; filter: grayscale(1); border-left-color: #28a745 !important; }
    .amount-val { font-weight: bold; color: #d9534f; font-size: 1.2em; }
    
    .detail-list { background: #fafafa; border-top: 1px solid #eee; padding: 10px; display: none; }
    .detail-item { display: flex; justify-content: space-between; font-size: 0.9em; padding: 10px 0; border-bottom: 1px dashed #ddd; color: #444; }
    
    .btn-add-detail { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; }
    .btn-pay { width: 100%; margin-top: 8px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: white; color: #666; }
    
    /* 銀行配色保持原樣 */
    .ctbc { border-left-color: #006633; } .ts { border-left-color: #e60012; }
    .esun { border-left-color: #009944; } .tcb { border-left-color: #005a3c; } 
    .dbs { border-left-color: #ff0000; } .cash { border-left-color: #6c757d; }

    .nav-back { margin-top: 20px; display: block; color: #999; text-decoration: none; font-size: 14px; }
    .sync-hint { font-size: 12px; color: #e67e22; margin-top: 10px; }
</style>
</head>
<body>

<div class="container">
    <div class="total-box">
        <small>♟️ 當前待繳總額</small>
        <div id="total-val" style="font-size:2.2em; font-weight:bold;">$ 0</div>
    </div>

    <div id="list"></div>

    <div class="sync-hint">⚠️ 變動已暫存手機，永久存檔請更新 data.js</div>
    
    <button style="width:100%; padding:15px; margin-top:20px; border-radius:12px; border:1px solid #ddd; background:#fff; color:var(--primary); font-weight:bold;" onclick="exportJSON()">📋 匯出 JSON 備份</button>
    
    <a href="index.html" class="nav-back">♟️ 回員工查詢</a>
</div>

<script>
  let cardData = [];

  window.onload = function() {
    // 優先讀取手機暫存，若無則讀取 data.js
    const local = localStorage.getItem('dali_finance_data');
    cardData = local ? JSON.parse(local) : MY_CARD_DATA;
    render();
  };

  function render() {
    const list = document.getElementById('list');
    let totalAll = 0;
    list.innerHTML = '';
    const today = new Date().getDate();

    // 排序邏輯保持原樣
    const sortedData = [...cardData].sort((a, b) => {
      let valA = (a.s > today) ? a.s : a.s + 100;
      let valB = (b.s > today) ? b.s : b.s + 100;
      return valA - valB;
    });

    sortedData.forEach((item) => {
      // 找出這筆資料在原始 cardData 中的索引
      const origIdx = cardData.findIndex(c => c.id === item.id);
      const cardTotal = item.details.reduce((sum, d) => sum + parseInt(d.amt || 0), 0);
      if (!item.paid) totalAll += cardTotal;

      const group = document.createElement('div');
      group.className = "card-group " + item.cls + (item.paid ? " paid" : "");
      
      const main = document.createElement('div');
      main.className = 'card-main';
      main.onclick = () => {
        const el = document.getElementById('details-' + item.id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
      };
      
      main.innerHTML = `<div><strong>${item.name}</strong><br><small>結 ${item.s} | 繳 ${item.d}</small></div>
                       <div style="text-align:right"><div class="amount-val">$${cardTotal.toLocaleString()}</div>
                       <small style="color:#aaa">${item.paid ? "✅已繳" : "⏳待繳"}</small></div>`;

      const detailArea = document.createElement('div');
      detailArea.className = 'detail-list';
      detailArea.id = 'details-' + item.id;
      
      item.details.forEach((d, dIdx) => {
        const dDiv = document.createElement('div');
        dDiv.className = 'detail-item';
        dDiv.innerHTML = `<span>${d.date} ${d.note}</span><strong>$${parseInt(d.amt).toLocaleString()}</strong>`;
        dDiv.onclick = () => { if(confirm("刪除此筆明細？")){ cardData[origIdx].details.splice(dIdx, 1); sync(); } };
        detailArea.appendChild(dDiv);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'btn-add-detail';
      addBtn.innerText = '+ 新增明細';
      addBtn.onclick = () => {
        const now = new Date();
        const date = prompt("日期:", (now.getMonth()+1).toString().padStart(2,'0')+'/'+now.getDate().toString().padStart(2,'0'));
        const note = prompt("內容:", "一般消費");
        const amt = prompt("金額:");
        if(date && note && amt) {
          cardData[origIdx].details.push({date, note, amt: parseInt(amt)});
          sync();
        }
      };

      const payBtn = document.createElement('button');
      payBtn.className = 'btn-pay';
      payBtn.innerText = item.paid ? "標記為待繳" : "標記為已繳費";
      payBtn.onclick = () => { cardData[origIdx].paid = !cardData[origIdx].paid; sync(); };

      detailArea.appendChild(addBtn);
      if(item.type !== 'cash') detailArea.appendChild(payBtn);
      group.appendChild(main);
      group.appendChild(detailArea);
      list.appendChild(group);
    });
    document.getElementById('total-val').innerText = '$ ' + totalAll.toLocaleString();
  }

  function sync() {
    render();
    // 存入手機暫存
    localStorage.setItem('dali_finance_data', JSON.stringify(cardData));
  }

  function exportJSON() {
    const jsonStr = JSON.stringify(cardData);
    const blob = new Blob([jsonStr], {type: "text/plain"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "card_data_backup.txt";
    a.click();
    alert("已下載備份檔，請將內容貼回 GitHub 的 card_data.js 或 試算表 A1 以完成永久存檔。");
  }
</script>
</body>
</html>
