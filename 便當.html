<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>便當報數工具-民國版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 40px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; }
        label { width: 120px; font-weight: bold; color: #444; font-size: 16px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #1a73e8; background-color: #f8fbff; }
        .total-display { text-align: right; font-weight: bold; color: #d93025; margin: 15px 0; font-size: 18px; }
        .result-area { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px dashed #ccc; white-space: pre-wrap; font-size: 16px; line-height: 1.6; color: #333; margin-top: 10px; min-height: 120px; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        button:active { transform: translateY(1px); }
        .hint { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>實毅營造 便當統計</h2>
    
    <div class="input-group">
        <label>印尼 (不豬)</label>
        <input type="number" id="indo" value="0" min="0" oninput="updateText()" onfocus="this.select()">
    </div>

    <div class="input-group">
        <label>越南 (一般)</label>
        <input type="number" id="vn" value="0" min="0" oninput="updateText()" onfocus="this.select()">
    </div>

    <div class="input-group">
        <label>台灣 (一般)</label>
        <input type="number" id="tw" value="0" min="0" oninput="updateText()" onfocus="this.select()">
    </div>

    <div class="total-display">
        目前總數: <span id="totalNum">0</span>
    </div>

    <div class="result-area" id="finalText"></div>
    
    <button onclick="copyToClipboard()">複製報數文本</button>
    <div class="hint">PC操作提示：按 Tab 鍵切換輸入框</div>
</div>

<script>
    function updateText() {
        const indo = parseInt(document.getElementById('indo').value) || 0;
        const vn = parseInt(document.getElementById('vn').value) || 0;
        const tw = parseInt(document.getElementById('tw').value) || 0;
        
        // 越南 + 台灣 = 一般 (台)
        const generalTotal = vn + tw;
        const total = indo + generalTotal;
        
        document.getElementById('totalNum').innerText = total;

        // 取得今日日期與星期
        const now = new Date();
        const year = now.getFullYear() - 1911; // 轉民國年
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const date = now.getDate().toString().padStart(2, '0');
        
        const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
        const dayStr = weekDays[now.getDay()];

        const text = `您好今日訂餐, 實毅營造
${year}/${month}/${date}(${dayStr})
印尼: ${indo}
台: ${generalTotal}
總共: ${total}`;

        document.getElementById('finalText').innerText = text;
    }

    function copyToClipboard() {
        const text = document.getElementById('finalText').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = '✅ 已複製！';
            btn.style.backgroundColor = '#34a853';
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '#1a73e8';
            }, 1500);
        });
    }

    // 初始化日期
    updateText();
</script>

</body>
</html>
